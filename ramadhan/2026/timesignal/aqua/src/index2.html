<body>

    <style>
      @import url("https://idnmedia.github.io/preview/ramadhan/2026/timesignal/aqua//src/style.css");
    </style>
    
    <div id="mobile" class="banner-box">
  <a href="https://www.sehataqua.co.id/ramadanademaqua/?utm_source=Banner_TimeSignal&utm_medium=IMAGE&utm_campaign=Aqua-All-02-26-RAMADAN-IDN-Awareness-CPM&utm_term=CPM&utm_content=IMAGE" target="_blank" class="click-layer"></a>

  <div class="imsak-container">

      <select id="citySelect"></select>

  </div>

  <img id="banner-general" src="https://idnmedia.github.io/preview/ramadhan/2026/timesignal/aqua/src/320x320-default.jpg" class="banner-img active">
  <img id="banner-berbuka" src="https://idnmedia.github.io/preview/ramadhan/2026/timesignal/aqua/src/320x320-berbuka.jpg" class="banner-img">
  <img id="banner-berpuasa" src="https://idnmedia.github.io/preview/ramadhan/2026/timesignal/aqua/src/320x320-imsyak.jpg" class="banner-img">
</div>



<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
<script src="https://idnmedia.github.io/preview/ramadhan/2026/timesignal/aqua/src/data-jadwal.js"></script>
<script src="https://idnmedia.github.io/preview/ramadhan/2026/timesignal/aqua/src/app.js"></script>
<script>
// idnads_header_leaderboard (single)
const data1 = parent.document.getElementById('idnads_header_leaderboard');
if (data1) {
    data1.style.height = "340px";
}

// Class css-1gyevap (bisa lebih dari satu)
const data2 = parent.document.getElementsByClassName('css-1gyevap');
if (data2.length > 0) {
    Array.from(data2).forEach(el => {
        el.style.height = "340px";
    });
}

// Semua id yang diawali div-gpt-ad-leaderboard
const leaderboardAds = parent.document.querySelectorAll('[id^="div-gpt-ad-leaderboard"]');

leaderboardAds.forEach(el => {
    el.style.setProperty('max-height', '340px', 'important');
});
</script>
<script type="text/javascript">
if(top!=self){
    window.frameElement.style = 'width: 320px; height: 320px; margin-top: 5px; position: relative;';
};
</script>
    
</body>
</html>
