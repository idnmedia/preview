<html>
    <body style="margin: 0;">
        <div style="position: absolute; width: 300px; height: 250px; background-color: white; border-radius: 10px; left: 0; right: 0; margin: auto;"> 
    <a href="#" target="_blank" style="position: absolute; z-index: 9; right: 0px; left: 0; margin: auto; bottom: 0px; height: 70px; width: 300px;"></a>
    <span style="position: absolute; font-size: 13px; z-index: 2; color: white; background-color: #ea0b2b ; left: 0px; right: 0px; margin: auto; border-radius: 5px; display: block; bottom: 21px; padding: 3px; width: 110px; text-align: center; font-family: 'poppins', sans-serif;">Selengkapnya</span>
    <video id="videoInBanner" loop muted playsinline preload="none" style="width: 300px; height: 180px; position: absolute; z-index: 1; background-color: black; left: 0; right: 0; margin: auto;">
        <source src="video.mp4" type="video/mp4">
    </video>   
</div>

<script>
(function() {
    var video = document.getElementById('videoInBanner');
    if (!video) return;
    
    // Pastikan video tidak play otomatis
    video.pause();
    
    var hasStartedPlaying = false;
    var observer = null;
    
    // Fungsi untuk mengecek apakah video benar-benar visible di viewport
    function isVideoVisible() {
        var rect = video.getBoundingClientRect();
        var windowHeight = window.innerHeight || document.documentElement.clientHeight;
        var windowWidth = window.innerWidth || document.documentElement.clientWidth;
        
        // Hitung persentase video yang terlihat
        var visibleHeight = Math.min(rect.bottom, windowHeight) - Math.max(rect.top, 0);
        var visibleWidth = Math.min(rect.right, windowWidth) - Math.max(rect.left, 0);
        
        if (visibleHeight <= 0 || visibleWidth <= 0) return false;
        
        var visiblePercentage = (visibleHeight * visibleWidth) / (rect.height * rect.width);
        
        // Hanya dianggap visible jika minimal 30% video terlihat
        return visiblePercentage >= 0.3;
    }
    
    // Fungsi untuk play video dengan aman
    function safePlayVideo() {
        if (video.paused && isVideoVisible() && !hasStartedPlaying) {
            hasStartedPlaying = true;
            video.play().then(function() {
                // Play berhasil
                console.log('Video started playing');
            }).catch(function(error) {
                // Jika play gagal, reset flag
                hasStartedPlaying = false;
                console.log('Play blocked:', error);
            });
        }
    }
    
    // Fungsi untuk pause video
    function safePauseVideo() {
        if (!video.paused) {
            video.pause();
            hasStartedPlaying = false;
        }
    }
    
    // Event handler untuk scroll
    function onScrollOrResize() {
        if (isVideoVisible()) {
            // Video visible, play jika belum play
            if (video.paused && !hasStartedPlaying) {
                hasStartedPlaying = true;
                video.play().catch(function(e) {
                    hasStartedPlaying = false;
                    console.log('Play failed on scroll:', e);
                });
            }
        } else {
            // Video tidak visible, pause jika sedang play
            if (!video.paused) {
                video.pause();
                hasStartedPlaying = false;
            }
        }
    }
    
    // Gunakan IntersectionObserver dengan setting yang lebih ketat
    if (window.IntersectionObserver) {
        observer = new IntersectionObserver(function(entries) {
            entries.forEach(function(entry) {
                // Gunakan intersectionRatio untuk deteksi yang lebih akurat
                if (entry.intersectionRatio >= 0.3) {
                    // Video cukup terlihat (minimal 30%)
                    if (video.paused && !hasStartedPlaying) {
                        hasStartedPlaying = true;
                        video.play().catch(function(e) {
                            hasStartedPlaying = false;
                            console.log('Play failed:', e);
                        });
                    }
                } else {
                    // Video tidak cukup terlihat
                    if (!video.paused) {
                        video.pause();
                        hasStartedPlaying = false;
                    }
                }
            });
        }, {
            threshold: [0, 0.3, 0.5, 0.7, 1] // Multiple threshold untuk deteksi lebih akurat
        });
        
        observer.observe(video);
    } 
    
    // Tetap pasang scroll listener sebagai backup
    window.addEventListener('scroll', onScrollOrResize);
    window.addEventListener('resize', onScrollOrResize);
    window.addEventListener('orientationchange', onScrollOrResize);
    
    // Pastikan video tidak play saat load
    setTimeout(function() {
        // Cek posisi video, jika terlihat di awal sekalipun, JANGAN play dulu
        // Tunggu user scroll terlebih dahulu
        video.pause();
        hasStartedPlaying = false;
        
        // Optional: Jika memang ingin play saat video sudah terlihat di awal 
        // (misal posisi di atas fold), uncomment baris di bawah
        // TAPI sesuai request Anda, video baru play saat user scroll
        // if (isVideoVisible()) {
        //     safePlayVideo();
        // }
    }, 500);
    
    // Handle video ended untuk looping
    video.addEventListener('ended', function() {
        if (video.hasAttribute('loop')) {
            // Jika masih visible, play lagi
            if (isVideoVisible()) {
                hasStartedPlaying = false; // Reset flag
                video.play().catch(function(e) {});
            } else {
                // Reset flag saja tanpa play
                hasStartedPlaying = false;
            }
        }
    });
    
    // Debug: Tampilkan status di console (opsional, bisa dihapus)
    console.log('Video banner ready - will play when user scrolls into view');
    
})();
</script>
    </body>
</html>
